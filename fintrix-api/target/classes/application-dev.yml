# ================================================================
# DEV Profile
# ================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/fintrix_dev
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 5
          max-idle: 3

logging:
  level:
    com.fintrix: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
  file:
    name: logs/fintrix-dev.log # saves all logs here
fintrix:
  oauth2:
    authorized-redirect-uris:
      - http://localhost:5173/oauth2/callback
      - https://fintrix.vercel.app/oauth2/callback
      - http://localhost:3000/oauth2/redirect

server:
  port: 8080